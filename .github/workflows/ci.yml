name: CI

on:
  push:
    branches:
      - Improvements
  pull_request:

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --silent

      - name: Run build
        run: npm run build

  python-static:
    name: Python static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: |
          find backend/app ml -type f -name "*.py" -print0 | xargs -0 python -m py_compile
          python -m py_compile backend/test.py test_ds.py
